<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceX AI - Final Version</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #141414; padding: 20px; border-radius: 10px; border: 1px solid #333; width: 100%; max-width: 400px; margin-bottom: 20px; }
        h3 { color: #ffcc00; text-align: center; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-ai { background: linear-gradient(45deg, #7b2ff7, #00d4ff); color: #fff; }
        .btn-save { background: #ffcc00; color: #000; }
        table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 15px; }
        th { background: #222; color: #ffcc00; padding: 8px; border-bottom: 1px solid #333; }
        td { padding: 8px; border-bottom: 1px solid #222; background: #181818; text-align: center; }
        .in-small { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 5px; text-align: center; border-radius: 3px; }
        #loader { display: none; color: #ffcc00; font-size: 12px; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>1. AKTIFKAN 12 TIM</h3>
        <button class="btn btn-save" onclick="load12Tim()">MUAT SLOT 12 TIM</button>
    </div>

    <div class="card">
        <h3>2. SCAN SCOREBOARD</h3>
        <input type="file" id="foto" accept="image/*" style="display:none;" onchange="prosesAI(event)">
        <button class="btn btn-ai" onclick="document.getElementById('foto').click()">UPLOAD & SCAN</button>
        <div id="loader">SEDANG MENGANALISA... JANGAN TUTUP HALAMAN</div>
    </div>

    <div class="card">
        <h3>3. HASIL VERIFIKASI</h3>
        <table>
            <thead>
                <tr>
                    <th style="text-align:left;">TIM</th>
                    <th>RANK</th>
                    <th>KILL</th>
                </tr>
            </thead>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>

    <script>
        const API_KEY = "AIzaSyAc7mgwZCEDdVMdj_HKYg5s7yxMfOmETLU";

        function load12Tim() {
            let tims = [];
            for(let i=1; i<=12; i++) { tims.push({ name: "TIM " + i }); }
            localStorage.setItem('ff_data_fix', JSON.stringify(tims));
            render();
            alert("12 Slot Tim Siap!");
        }

        function render() {
            const data = JSON.parse(localStorage.getItem('ff_data_fix')) || [];
            const tbody = document.getElementById('tabelBody');
            tbody.innerHTML = "";
            data.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td style="text-align:left; font-weight:bold; color:#00d4ff;">${item.name}</td>
                    <td><input type="number" class="in-small r-rank" value="0"></td>
                    <td><input type="number" class="in-small r-kill" value="0"></td>
                </tr>`;
            });
        }

        async function prosesAI(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('loader').style.display = 'block';
            
            try {
                const base64 = await toBase64(file);
                const prompt = "Analisa scoreboard FF ini. Berikan hasil Rank dan Kill dalam format JSON array saja.";

                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64.split(',')[1] } }] }]
                    })
                });

                const json = await res.json();
                
                // PENGAMAN: Cek apakah Google kasih error
                if (json.error) {
                    throw new Error(json.error.message);
                }

                const rawText = json.candidates[0].content.parts[0].text;
                // PENGAMAN: Ambil cuma bagian JSON saja
                const cleaned = rawText.match(/\[[\s\S]*\]/);
                if (!cleaned) throw new Error("AI tidak menemukan tabel data.");

                const hasil = JSON.parse(cleaned[0]);
                const rows = document.querySelectorAll('#tabelBody tr');

                hasil.forEach((h, i) => {
                    if (rows[i]) {
                        rows[i].querySelector('.r-rank').value = h.rank || 0;
                        rows[i].querySelector('.r-kill').value = h.total_kill || h.kill || 0;
                        rows[i].style.backgroundColor = "#003311";
                    }
                });

                alert("Scan Selesai Bre!");

            } catch (e) {
                alert("INFO: " + e.message);
                console.error(e);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function toBase64(file) {
            return new Promise((r) => { 
                const rd = new FileReader(); 
                rd.readAsDataURL(file); 
                rd.onload = () => r(rd.result); 
            });
        }

        window.onload = render;
    </script>
</body>
</html>
