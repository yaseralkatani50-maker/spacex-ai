<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpaceX Klasemen - Final Pro</title>
    <style>
        :root {
            --bg: #ffffff; 
            --row-even: #ffffff;
            --row-odd: #e0e0e0; 
            --line-bold: #000000; 
            --border: #888888; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); margin: 0; padding: 5px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 5px; width: 100%; }
        h2 { color: #000; margin: 0; font-size: 12px; font-weight: bold; }
        
        .input-sesi {
            border: 1.5px solid #000; font-size: 10px; font-weight: bold; 
            text-align: center; padding: 2px; width: 140px; margin-top: 3px;
        }
        
        .wrapper { 
            width: 100%; 
            max-width: 400px;
            border: 2px solid var(--line-bold); 
            background: #fff;
            overflow: hidden;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed;
        }
        
        th, td { 
            border: 1px solid var(--border); 
            padding: 4px 0; 
            text-align: center; 
            font-size: 8px;
            overflow: hidden;
        }

        th { 
            background: #d1d1d1; font-weight: bold; 
            border-bottom: 2px solid var(--line-bold);
            line-height: 1.1;
        }

        .wrap-text { white-space: normal !important; word-break: break-word; }

        .col-name { width: 75px; text-align: left; padding-left: 3px; font-weight: bold; border-right: 2px solid var(--line-bold) !important; }
        .col-m { width: 22px; } 
        .col-total { width: 35px; font-weight: bold; border-left: 2px solid var(--line-bold) !important; }
        .col-rank { width: 28px; font-weight: bold; }

        .border-right-bold { border-right: 2px solid var(--line-bold) !important; }

        .input-name {
            background: transparent; border: none; width: 100%; 
            font-weight: bold; font-size: 8px; text-transform: uppercase; pointer-events: none;
        }

        .input-score {
            background: transparent; border: none; width: 100%; 
            text-align: center; font-size: 8px; pointer-events: none;
        }

        tbody tr:nth-child(even) { background-color: var(--row-even); }
        tbody tr:nth-child(odd) { background-color: var(--row-odd); }
        tbody tr { border-bottom: 1px solid var(--line-bold); }

        .summary { width: 100%; max-width: 400px; margin-top: 10px; display: flex; justify-content: flex-start; margin-bottom: 40px;}
        .summary table { width: 160px; border: 2px solid var(--line-bold); font-size: 9px; }
        .summary td { padding: 3px; font-weight: bold; border: 1px solid var(--line-bold); }

        .control-panel { width: 100%; max-width: 400px; gap: 5px; display: flex; flex-direction: column; border-top: 1px dashed #ccc; padding-top: 10px; }
        .panel-box { border: 1px solid #000; padding: 5px; border-radius: 4px; }
        textarea { width: 100%; font-size: 10px; padding: 5px; }
        
        .btn-group { display: flex; gap: 5px; margin-top: 3px; }
        .btn-action { flex: 1; background: #000; color: #fff; border: none; padding: 8px; font-weight: bold; font-size: 10px; cursor: pointer; border-radius: 3px; }
        .btn-danger { background: #c0392b; }
        .btn-success { background: #27ae60; width: 100%; margin-top: 5px; }

        /* FIX: Style khusus kolom input agar KILL lebih lebar dan kelihatan angkanya */
        .input-panel-table { width: 100%; border-collapse: collapse; }
        .input-panel-table td { font-size: 9px; padding: 5px 2px; }
        .input-panel-kl { 
            width: 55px !important; /* Diperlebar agar 1111 atau 1 10 1 kelihatan jelas */
            text-align: center; 
            border: 1px solid #888; 
            border-radius: 2px;
            font-size: 10px;
        }
        .input-panel-rank { font-size: 10px; }
        
        .gold { background: #f1c40f !important; } 
        .silver { background: #bdc3c7 !important; } 
        .bronze { background: #cd7f32 !important; color: #fff; }
        .reset-btn { position: fixed; bottom: 5px; right: 5px; background: #000; color: #fff; border: none; padding: 4px 8px; font-size: 8px; border-radius: 4px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="header">
        <h2>KLASEMEN POINT - FT BY MANK X SpaceX</h2>
        <input type="text" class="input-sesi" id="inputSesi" value="HASIL SESI" oninput="saveData()">
    </div>

    <div class="wrapper">
        <table id="mainTable">
            <thead>
                <tr>
                    <th rowspan="2" class="col-name wrap-text">NAMA KAPTEN</th>
                    <th colspan="3" class="border-right-bold">Match 1</th>
                    <th colspan="3" class="border-right-bold">Match 2</th>
                    <th colspan="3" class="border-right-bold">Match 3</th>
                    <th rowspan="2" class="col-total wrap-text">TOTAL<br>POINT</th>
                    <th rowspan="2" class="col-rank">JUARA</th>
                </tr>
                <tr>
                    <th class="col-m">PL</th><th class="col-m">KL</th><th class="col-m border-right-bold">PT</th>
                    <th class="col-m">PL</th><th class="col-m">KL</th><th class="col-m border-right-bold">PT</th>
                    <th class="col-m">PL</th><th class="col-m">KL</th><th class="col-m border-right-bold">PT</th>
                </tr>
            </thead>
            <tbody id="teamRows"></tbody>
        </table>
    </div>

    <div class="summary">
        <table>
            <tbody>
                <tr style="background:#d1d1d1;"><td colspan="2" style="text-align:center">RINGKASAN HASIL</td></tr>
                <tr><td>JUARA 1</td><td id="s1">-</td></tr>
                <tr><td>JUARA 2</td><td id="s2">-</td></tr>
                <tr><td>JUARA 3</td><td id="s3">-</td></tr>
                <tr><td style="color:red">MOST KILL</td><td id="smk">-</td></tr>
            </tbody>
        </table>
    </div>

    <div class="control-panel">
        <div class="panel-box">
            <textarea id="rawText" rows="2" placeholder="Paste List Pendaftaran..."></textarea>
            <div class="btn-group">
                <button class="btn-action" onclick="extractNames()">MASUKKAN NAMA</button>
                <button class="btn-action btn-danger" onclick="clearNamesOnly()">HAPUS LIST</button>
            </div>
        </div>
        <div class="panel-box">
            <select id="targetMatch" style="width:100%; font-size:10px; padding: 3px; margin-bottom: 5px;">
                <option value="1">Match 1</option>
                <option value="2">Match 2</option>
                <option value="3">Match 3</option>
            </select>
            <table class="input-panel-table">
                <tbody id="inputTableBodyInner"></tbody>
            </table>
            <button class="btn-action btn-success" onclick="sendToMainTable()">🚀 KIRIM DATA MATCH</button>
        </div>
    </div>

    <button class="reset-btn" onclick="resetAllData()">Reset All</button>

    <script>
        const pointSystem = { 1:12, 2:9, 3:8, 4:7, 5:6, 6:5, 7:4, 8:3, 9:2, 10:1, 11:0, 12:0 };
        
        function initTable() {
            let savedData = JSON.parse(localStorage.getItem('ff_pro_data')) || [];
            document.getElementById('inputSesi').value = localStorage.getItem('ff_pro_sesi') || "HASIL SESI";
            const mainContainer = document.getElementById('teamRows');
            const inputContainer = document.getElementById('inputTableBodyInner');
            mainContainer.innerHTML = ""; inputContainer.innerHTML = "";

            let rankOptions = `<option value="">-</option>`;
            for(let r=1; r<=12; r++) rankOptions += `<option value="${r}">${r}</option>`;

            for (let i = 0; i < 12; i++) {
                let d = savedData[i] || { name: "", m1:{p:"",k:""}, m2:{p:"",k:""}, m3:{p:"",k:""} };
                
                // Row Tabel Utama
                let trMain = document.createElement('tr');
                trMain.innerHTML = `
                    <td class="col-name"><input type="text" value="${d.name}" class="input-name" readonly tabindex="-1"></td>
                    <td><input type="text" value="${d.m1.p}" class="input-score m1-p" readonly tabindex="-1"></td>
                    <td><input type="text" value="${d.m1.k}" class="input-score m1-k" readonly tabindex="-1"></td>
                    <td class="border-right-bold m1-pt">0</td>
                    <td><input type="text" value="${d.m2.p}" class="input-score m2-p" readonly tabindex="-1"></td>
                    <td><input type="text" value="${d.m2.k}" class="input-score m2-k" readonly tabindex="-1"></td>
                    <td class="border-right-bold m2-pt">0</td>
                    <td><input type="text" value="${d.m3.p}" class="input-score m3-p" readonly tabindex="-1"></td>
                    <td><input type="text" value="${d.m3.k}" class="input-score m3-k" readonly tabindex="-1"></td>
                    <td class="border-right-bold m3-pt">0</td>
                    <td class="col-total total-pt">0</td>
                    <td class="rank-cell"></td>
                `;
                mainContainer.appendChild(trMain);

                // Row Panel Input
                let trInput = document.createElement('tr');
                trInput.style.borderBottom = "1px solid #ccc";
                trInput.innerHTML = `
                    <td style="text-align:left; width: 45%; overflow:hidden; white-space:nowrap;" class="panel-name-label">${d.name || "-"}</td>
                    <td style="width: 20%;"><select class="input-panel-rank">${rankOptions}</select></td>
                    <td style="width: 35%;"><input type="text" class="input-panel-kl" placeholder="Input KILL"></td>
                `;
                inputContainer.appendChild(trInput);
            }
            update();
        }

        function processSmartSum(val) {
            if (!val || val.toString().trim() === "") return 0;
            let str = val.toString().trim();
            let total = 0;
            if (str.includes(' ')) {
                let parts = str.split(/\s+/);
                parts.forEach(p => { if (p !== "" && !isNaN(p)) total += parseInt(p); });
            } else {
                for (let char of str) { if (!isNaN(char)) total += parseInt(char); }
            }
            return total;
        }

        function extractNames() {
            let names = document.getElementById('rawText').value.split('\n').filter(l => l.trim() !== "").map(l => l.replace(/^\d+[\.\s\-]+/, '').toUpperCase().trim());
            let inputs = document.querySelectorAll('.input-name');
            inputs.forEach((inp, i) => { if(names[i]) inp.value = names[i]; });
            updateInputLabels();
            saveData();
        }

        function clearNamesOnly() {
            if(confirm("Hapus semua nama kapten?")) {
                document.querySelectorAll('.input-name').forEach(inp => inp.value = "");
                document.getElementById('rawText').value = "";
                updateInputLabels();
                saveData();
            }
        }

        function updateInputLabels() {
            let names = document.querySelectorAll('.input-name');
            let labels = document.querySelectorAll('.panel-name-label');
            names.forEach((n, i) => labels[i].innerText = n.value || "-");
        }

        function sendToMainTable() {
            let m = document.getElementById('targetMatch').value;
            let iRows = document.querySelectorAll('#inputTableBodyInner tr');
            let mRows = document.querySelectorAll('#teamRows tr');
            iRows.forEach((row, i) => {
                let r = row.querySelector('.input-panel-rank').value;
                let kRaw = row.querySelector('.input-panel-kl').value;
                let kFinal = (kRaw !== "") ? processSmartSum(kRaw) : "";
                
                if(r !== "" || kRaw !== "") {
                    mRows[i].querySelector(`.m${m}-p`).value = r;
                    mRows[i].querySelector(`.m${m}-k`).value = kFinal;
                }
                row.querySelector('.input-panel-rank').value = "";
                row.querySelector('.input-panel-kl').value = "";
            });
            update(); alert("Data Match " + m + " Berhasil Dihitung!");
        }

        function update() {
            let rows = document.querySelectorAll('#teamRows tr');
            let data = [];
            rows.forEach(row => {
                let tp = 0, tk = 0;
                for(let m=1; m<=3; m++) {
                    let p = parseInt(row.querySelector(`.m${m}-p`).value) || 0;
                    let k = parseInt(row.querySelector(`.m${m}-k`).value) || 0;
                    let pt = (pointSystem[p] || 0) + k;
                    row.querySelector(`.m${m}-pt`).innerText = pt;
                    tp += pt; tk += k;
                }
                row.querySelector('.total-pt').innerText = tp;
                data.push({ name: row.querySelector('.input-name').value || "-", tp, tk, el: row });
            });

            let sorted = [...data].sort((a,b) => b.tp - a.tp || b.tk - a.tk);
            data.forEach(t => {
                let rank = sorted.findIndex(x => x === t) + 1;
                let c = t.el.querySelector('.rank-cell');
                c.innerText = rank <= 3 ? rank : "";
                c.className = "rank-cell " + (rank==1?'gold':rank==2?'silver':rank==3?'bronze':'');
            });
            if(sorted[0]) {
                document.getElementById('s1').innerText = sorted[0].name;
                document.getElementById('s2').innerText = sorted[1].name;
                document.getElementById('s3').innerText = sorted[2].name;
                let mk = [...data].sort((a,b) => b.tk - a.tk)[0];
                document.getElementById('smk').innerText = (mk.name !== "-" ? mk.name : "-") + " (" + mk.tk + ")";
            }
            saveData();
        }

        function saveData() {
            let arr = [];
            document.querySelectorAll('#teamRows tr').forEach(r => {
                arr.push({ 
                    name: r.querySelector('.input-name').value, 
                    m1:{p:r.querySelector('.m1-p').value, k:r.querySelector('.m1-k').value}, 
                    m2:{p:r.querySelector('.m2-p').value, k:r.querySelector('.m2-k').value}, 
                    m3:{p:r.querySelector('.m3-p').value, k:r.querySelector('.m3-k').value} 
                });
            });
            localStorage.setItem('ff_pro_data', JSON.stringify(arr));
            localStorage.setItem('ff_pro_sesi', document.getElementById('inputSesi').value);
        }

        function resetAllData() { if(confirm("Hapus seluruh data (Nama & Score)?")) { localStorage.clear(); location.reload(); } }
        window.onload = initTable;
    </script>
</body>
</html>
